<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071222" />
  <meta name="description" content="星域フロンティアは、スマホで遊べるターン制宇宙ストラテジーです。資源を集め、技術を伸ばし、星域を拡大し、CPU勢力と銀河の覇権を争います。" />
  <title>星域フロンティア | スマホ宇宙ストラテジー</title>
  <link rel="icon" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="css/style.css?v=20260605035508" />
</head>
<body>
  <div id="app" class="app-shell">
    <section id="titleScreen" class="screen title-screen is-active" aria-label="タイトル画面">
      <div class="title-bg"></div>
      <div class="title-shade"></div>
      <main class="title-scroll">
        <div class="title-card">
          <p class="eyebrow">Mobile Turn Based Space Strategy</p>
          <h1>星域フロンティア</h1>
          <p class="lead">小さな母星から始めて、探索・植民・開発・研究・艦隊建造を選びながら星域を広げる、スマホ向けの宇宙ストラテジー。</p>

          <section class="setup-panel">
            <h2>文明方針</h2>
            <p class="setup-hint">好きなプレイ感で選んでください。相性や最適解はゲーム内で探していきます。</p>
            <div id="doctrineCards" class="doctrine-cards"></div>
          </section>

          <section class="setup-panel compact-panel">
            <div class="seed-row">
              <label for="seedInput">銀河シード</label>
              <input id="seedInput" type="text" maxlength="18" placeholder="空欄ならランダム" autocomplete="off" />
              <button id="randomSeedBtn" class="ghost-btn" type="button">ランダム</button>
            </div>
            <div class="title-actions">
              <button id="startBtn" class="primary-btn" type="button">新しい銀河を開始</button>
              <button id="continueBtn" class="secondary-btn" type="button">続きから</button>
            </div>
          </section>

          <section class="setup-panel compact-panel">
            <h2>目的</h2>
            <p>資源を増やし、技術か艦隊か領土拡大に投資して、CPU勢力より早く銀河の主導権を握ります。</p>
            <div class="goal-grid">
              <span>支配勝利<br><b>60%保有</b></span>
              <span>技術勝利<br><b>最終技術</b></span>
              <span>覇権勝利<br><b>CPU母星制圧</b></span>
            </div>
          </section>
        </div>
      </main>
    </section>

    <section id="gameScreen" class="screen game-screen" aria-label="ゲーム画面">
      <canvas id="starCanvas" aria-label="星域マップ"></canvas>

      <header class="mobile-top">
        <div class="turn-chip" id="turnChip" role="button" tabindex="0" aria-label="ターンとAPの説明を開く">
          <span>Turn</span><b id="turnValue">1</b><em id="apValue">AP 3/3</em>
        </div>
        <div id="resourceBar" class="resource-bar" aria-label="資源一覧"></div>
      </header>

      <div class="map-tools" aria-label="マップ操作">
        <button id="homeBtn" type="button">母星</button>
        <button id="allMapBtn" type="button">全域</button>
        <button id="zoomInBtn" type="button">＋</button>
        <button id="zoomOutBtn" type="button">−</button>
      </div>

      <nav id="sideMenu" class="side-menu" aria-label="銀河メニュー">
        <button data-page="empire" type="button">艦隊</button>
        <button data-page="tech" type="button">研究</button>
        <button data-page="factions" type="button">勢力</button>
        <button data-page="codex" type="button">説明</button>
        <button data-page="log" type="button">ログ</button>
      </nav>

      <section id="coach" class="coach-card" aria-live="polite">
        <div>
          <span id="coachKicker">チュートリアル</span>
          <strong id="coachTitle">母星の周辺を見よう</strong>
          <p id="coachText">母星の隣にある「？」の星をタップしてください。</p>
        </div>
      </section>

      <section id="cpuReplay" class="cpu-replay" aria-live="polite" hidden></section>

      <section id="bottomSheet" class="bottom-sheet" aria-label="操作パネル">
        <button id="sheetToggle" class="sheet-grip" type="button" aria-label="操作パネルを開閉"></button>
        <div id="panelBody" class="panel-body"></div>
        <div class="turn-actions">
          <button id="saveBtn" class="ghost-btn" type="button">保存</button>
          <button id="endTurnBtn" class="primary-btn" type="button">ターン終了</button>
        </div>
      </section>

      <dialog id="infoModal" class="info-modal">
        <article class="modal-card">
          <button id="modalClose" class="modal-close" type="button" aria-label="閉じる">×</button>
          <div id="modalBody"></div>
        </article>
      </dialog>
    </section>
  </div>

  <script src="js/game.js?v=20260605035508"></script>
</body>
</html>
